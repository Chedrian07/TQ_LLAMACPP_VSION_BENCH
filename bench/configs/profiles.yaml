profiles:
  local:
    description: Local workstation defaults. Keep per-model execution hints from models.yaml.

  colab:
    description: Single-GPU Colab defaults for one-model benchmark runs.
    gpu_id: 0
    port: 18080
    parallel_requests: 1
    cache_ram: 20480
    slot_save_path: /content/TQ_LLAMACPP_VSION_BENCH/kvcache
    batch_size: 512
    ubatch_size: 512
    n_gpu_layers: 99
    no_warmup: true
    no_mmap: true
